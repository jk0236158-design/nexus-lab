title: "get_provider() を create_provider() にリネーム + api_key 必須引数追加"
difficulty: medium

trigger_conditions:
  file_count: 7
  change_type: cross_file_refactor
  shared_interface: true

instruction: |
  provider/registry.py の get_provider() 関数を以下のように変更してください:

  1. 関数名を get_provider → create_provider にリネーム
  2. 必須引数 api_key: str を追加（name の後に配置）
  3. 全ての呼び出し元を更新して、api_key="test-key" を渡すようにしてください
  4. __init__.py の re-export も更新してください
  5. 全テストが通る状態にしてください

