name: docs-build

# Build 検証専用 (PR で走る)。
# master への push 時の build + deploy は docs-deploy.yml に一本化済み。
# ここで build するのは PR レビュー時に artifact を確認するため。

on:
  pull_request:
    paths:
      - "packages/docs/**"
      - "packages/create-mcp-server/templates/**/README.md"
      - ".github/workflows/docs-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install docs dependencies
        working-directory: packages/docs
        run: npm install

      - name: Build VitePress site
        working-directory: packages/docs
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: packages/docs/.vitepress/dist
          retention-days: 7

      # Oto: Cloudflare Pages deploy step will be added here.
      # Expected secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_PROJECT_NAME
